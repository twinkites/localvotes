name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build config.js from repository secrets so API keys are never in git.
      # Add each key in: Settings → Secrets and variables → Actions → New repository secret
      - name: Build config.js from secrets
        env:
          OPENSTATES_API_KEY:  ${{ secrets.OPENSTATES_API_KEY }}
          PROPUBLICA_API_KEY:  ${{ secrets.PROPUBLICA_API_KEY }}
          FEC_API_KEY:         ${{ secrets.FEC_API_KEY }}
          CONGRESS_API_KEY:    ${{ secrets.CONGRESS_API_KEY }}
        run: |
          node -e "
            const cfg = {
              OPENSTATES_API_KEY:  process.env.OPENSTATES_API_KEY  || '',
              PROPUBLICA_API_KEY:  process.env.PROPUBLICA_API_KEY  || '',
              FEC_API_KEY:         process.env.FEC_API_KEY         || '',
              CONGRESS_API_KEY:    process.env.CONGRESS_API_KEY    || '',
            };
            const js = '// Auto-generated by GitHub Actions — do not edit\nconst CONFIG = ' +
              JSON.stringify(cfg, null, 2) + ';\n';
            require('fs').writeFileSync('config.js', js);
            console.log('config.js written (' + Object.keys(cfg).length + ' keys)');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
